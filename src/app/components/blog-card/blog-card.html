@let blogPost = post();

<article
  class="bg-white rounded-lg shadow-lg hover:shadow-xl transition overflow-hidden h-full flex flex-col"
>
  <!-- Image -->
  <div class="relative w-full h-48 bg-gray-300 overflow-hidden flex items-center justify-center">
    <img
      [src]="blogPost.imageUrl"
      [alt]="blogPost.title"
      loading="lazy"
      class="w-full h-full object-cover hover:scale-105 transition duration-300"
      onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22500%22 height=%22300%22%3E%3Crect fill=%22%23ddd%22 width=%22500%22 height=%22300%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2224%22 fill=%22%23666%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22%3EImage unavailable%3C/text%3E%3C/svg%3E'"
    />
  </div>

  <!-- Content -->
  <div class="p-6 flex flex-col flex-grow">
    <!-- Category Badge -->
    <div class="mb-3">
      <span
        class="inline-block bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-semibold"
      >
        {{ blogPost.category }}
      </span>
    </div>

    <!-- Title -->
    <h3 class="text-xl font-bold text-gray-900 mb-3 line-clamp-2">
      {{ blogPost.title }}
    </h3>

    <!-- Excerpt -->
    <p class="text-gray-600 text-sm mb-4 flex-grow line-clamp-3">
      {{ blogPost.excerpt }}
    </p>

    <!-- Meta Information -->
    <div class="flex items-center justify-between text-xs text-gray-500 mb-4">
      <span>{{ blogPost.date | slice : 0 : 10 }}</span>
      <span>{{ blogPost.readTime }} min read</span>
    </div>

    <!-- Read More Link -->
    <a
      [routerLink]="['/post', blogPost.slug]"
      class="inline-block bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded transition font-semibold text-sm"
    >
      Read More →
    </a>
  </div>
</article>
